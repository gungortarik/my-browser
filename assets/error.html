<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connection Interrupted</title>
  <style>
    :root {
      --bg-color: #0d0d0f;
      --accent: #5e6ad2;
      --text-primary: #f0f0f2;
      --text-secondary: #909095;
    }
    body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-color); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
    }
    .error-card {
      background: rgba(30, 30, 35, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px; padding: 40px; max-width: 480px; width: 90%;
      text-align: center; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .icon {
      width: 80px; height: 80px; background: rgba(235, 87, 87, 0.15); color: #eb5757;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px auto; font-size: 32px;
    }
    .icon svg { width: 40px; height: 40px; }
    h1 { margin: 0 0 12px 0; font-size: 24px; font-weight: 600; }
    p { margin: 0 0 24px 0; font-size: 15px; color: var(--text-secondary); line-height: 1.5; }
    .error-code {
      display: inline-block; background: rgba(0,0,0,0.3); padding: 4px 12px;
      border-radius: 6px; font-family: monospace; font-size: 13px; color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .btn {
      background: var(--accent); color: #fff; border: none; padding: 12px 32px;
      border-radius: 30px; font-size: 15px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; text-decoration: none; display: inline-block;
    }
    .btn:hover { background: #7b86e8; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(94, 106, 210, 0.3); }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
    </div>
    <h1 id="title">This site can't be reached</h1>
    <p id="desc">Check if there is a typo in the URL, or if your internet connection is active.</p>
    <div class="error-code" id="errorCode">ERR_UNKNOWN</div>
    <div>
      <button class="btn" id="retryBtn">Try Again</button>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const retryUrl = urlParams.get('url');
    const errorDesc = urlParams.get('error') || 'Navigation Failed';
    
    if (errorDesc) {
      document.getElementById('errorCode').textContent = errorDesc.toUpperCase();
    }
    
    document.getElementById('retryBtn').addEventListener('click', () => {
      if (retryUrl) {
        window.location.href = retryUrl;
      } else {
        window.history.back();
      }
    });
  </script>
</body>
</html>
